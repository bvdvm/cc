name: Aktualizuj repertuar Cinema City

on:
  schedule:
    - cron: "0 6 * * 1"
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pobierz repertuar
        run: python scripts/fetch_repertoire.py

      - name: Commit zmian
        run: |
          git config user.name "repertuar-bot"
          git config user.email "actions@github.com"
          git add data/films.json
          if git diff --cached --quiet; then
            echo "Brak zmian."
          else
            git commit -m "Repertuar: $(date +%Y-%m-%d)"
            git push
          fi
